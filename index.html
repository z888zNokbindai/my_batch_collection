<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Notice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background: #000;
        color: #00ff88;
        font-family: monospace;
        text-align: center;
        padding: 20px;
    }
    #box {
        border: 2px solid #00ff88;
        padding: 20px;
        margin-top: 60px;
        max-width: 520px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0 0 20px #00ff88;
    }
    .btn {
        background: #00ff88;
        color: black;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        margin-top: 20px;
        font-weight: bold;
    }
    .btn:hover { background: #00ffaa; }
    .danger {
        color: red;
        font-size: 20px;
        animation: blink 1s infinite;
    }
    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>
<body>

<h1>🔐 Security Verification</h1>

<div id="box">
    <p>Initializing system check...</p>
    <button class="btn" onclick="startScan()">Start Verification</button>
</div>

<script>
function startScan() {
    const box = document.getElementById("box");

    box.innerHTML = "<p>Scanning device information...</p>";

    setTimeout(() => {
        box.innerHTML = "<p>Checking account activity...</p>";
    }, 1500);

    setTimeout(() => {
        box.innerHTML = "<p>Analyzing login history...</p>";
    }, 3000);

    setTimeout(() => {
        box.innerHTML = "<p class='danger'>⚠ Suspicious activity detected ⚠</p>";
    }, 4500);

    setTimeout(() => {
        box.innerHTML = `
            <h2 style="color:red;">ACCOUNT DISABLED</h2>
            <p>Your account has been temporarily disabled due to unauthorized usage.</p>
            <p>Multiple access attempts from unknown sources have been detected.</p>
            <br>
            <p><b>Status:</b> LOCKED</p>
            <p><b>Security Level:</b> HIGH RISK</p>
            <br>
            <button class="btn" onclick="location.reload()">Re-check</button>
        `;
    }, 6500);
}
</script>

</body>
</html>
